<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mythical AI | Founder Portal</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --p-purple: #7D2AE8; --dark-bg: #050505; --card-bg: #0D0D0D; --border: #1a1a1a; }
        body { margin:0; font-family: 'Inter', sans-serif; background:#000; color:#fff; display:flex; height: 100vh; overflow: hidden; }
        #sidebar { width:300px; background: var(--dark-bg); padding:20px; display:flex; flex-direction:column; border-right: 1px solid #111; gap: 12px; transition: 0.4s ease; position: relative; z-index: 1000; }
        #sidebar.closed { width: 0; padding: 0; overflow: hidden; border: none; }
        .logo-text { color: var(--p-purple); font-weight: 900; font-size: 1.2rem; letter-spacing: 3px; }
        .tier-badge { font-size: 0.6rem; padding: 3px 8px; border-radius: 6px; font-weight: bold; margin-left: 8px; text-transform: uppercase; letter-spacing: 1px; }
        .badge-basic { background: #222; color: #888; border: 1px solid #333; }
        .badge-founder { background: linear-gradient(90deg, #FFD700, #FFA500); color: #000; animation: pulse-gold 2s infinite; border: 1px solid #FFF; }
        .badge-admin { background: #ff0044; color: #fff; border: 1px solid #FFF; }
        .badge-mod { background: #00ffcc; color: #000; border: 1px solid #FFF; }
        @keyframes pulse-gold { 0%, 100% { box-shadow: 0 0 5px rgba(255,215,0,0.4); } 50% { box-shadow: 0 0 20px rgba(255,215,0,0.8); } }
        .input-container { position: absolute; bottom: 35px; left: 0; right: 0; display: flex; justify-content: center; z-index: 100; }
        .input-wrapper { width: 65%; background: rgba(15,15,15,0.8); backdrop-filter: blur(20px); border-radius: 50px; padding: 8px 12px 8px 25px; display: flex; align-items: center; border: 1px solid #222; }
        #input { flex:1; background:transparent; border:none; color:#fff; outline:none; font-size: 1rem; padding: 12px 0; }
        #main { flex:1; display:flex; flex-direction:column; position: relative; }
        #chat { flex:1; overflow-y:auto; padding: 80px 15% 150px 15%; scroll-behavior: smooth; }
        .msg { max-width: 80%; margin: 20px 0; padding: 18px 24px; border-radius: 24px; animation: msgFade 0.4s ease; line-height: 1.6; }
        .user { margin-left:auto; background: #111; border: 1px solid #222; }
        .bot { background: transparent; border-left: 2px solid var(--p-purple); padding-left: 25px; color: #ddd; }
        #sidebar-toggle { position: fixed; top: 20px; left: 20px; z-index: 1001; background: #111; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 12px; cursor: pointer; }
        #login { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; background:#000; z-index: 3000; }
        .history-item { padding:12px; color:#555; cursor:pointer; font-size:0.85rem; transition: 0.3s; border-radius: 8px; margin-bottom: 5px; }
        .history-item:hover { background: #111; color: #fff; }
        @keyframes msgFade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
    </style>
</head>
<body>

<button id="sidebar-toggle" onclick="toggleSidebar()"><i data-lucide="menu" size="20"></i></button>

<div id="login">
    <div style="background:#0D0D0D; padding:45px; border-radius:30px; border:1px solid #222; text-align:center; width:320px;">
        <h2 style="color:var(--p-purple); letter-spacing:3px;">MYTHICAL AI</h2>
        <input id="userName" style="width:90%; padding:15px; margin:10px 0; background:#000; border:1px solid #333; color:#fff; border-radius:14px; outline:none;" placeholder="Enter Name" oninput="checkStaff()">
        <div id="staff-pass-area" style="display:none; margin-top:10px; padding-top:10px;">
            <p id="staff-label" style="font-size: 0.75rem; color: #FFD700; font-weight: bold; margin-bottom: 8px;">SECURITY PIN REQUIRED</p>
            <input id="staffPass" type="password" style="width:90%; padding:15px; background:#000; border:1px solid #FFD700; color:#fff; border-radius:14px;" placeholder="Enter Pin">
        </div>
        <button onclick="loginUser()" style="width:100%; padding:15px; background:var(--p-purple); color:#fff; border:none; border-radius:14px; cursor:pointer; font-weight:bold; margin-top:15px;">LOGIN</button>
    </div>
</div>

<div id="sidebar">
    <div style="cursor:pointer; padding: 10px 0;" onclick="location.reload()"><span class="logo-text">MYTHICAL AI</span></div>
    <div style="background:#0A0A0A; padding:15px; border-radius:18px; border:1px solid var(--border);">
        <div style="display: flex; align-items: center; gap: 12px;">
            <div id="userInit" style="width:36px; height:36px; background:var(--p-purple); border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:bold;">?</div>
            <div>
                <div style="display:flex; align-items:center;">
                    <span id="sideName" style="font-size:0.9rem; font-weight:bold;">Guest</span>
                    <span id="userTier" class="tier-badge badge-basic">BASIC</span>
                </div>
            </div>
        </div>
    </div>
    <button onclick="newChat()" style="width:100%; padding:12px; background:transparent; border:1px solid #222; color:#fff; border-radius:12px; cursor:pointer; margin-top: 10px;">+ New Cloud Thread</button>
    <div id="history" style="flex:1; overflow-y:auto; margin:10px 0;"></div>
    <button onclick="localStorage.clear(); location.reload();" style="color:#ff4444; background:none; border:none; cursor:pointer; font-size:0.7rem; opacity:0.4;">Logout</button>
</div>

<div id="main">
    <div id="chat"></div>
    <div class="input-container">
        <div class="input-wrapper">
            <input id="input" placeholder="Ask Mythical AI..." onkeydown="if(event.key==='Enter') send()">
            <button onclick="send()" style="background:var(--p-purple); color:white; border:none; width:45px; height:45px; border-radius:50%; cursor:pointer;"><i data-lucide="arrow-up" size="22"></i></button>
        </div>
    </div>
</div>

<script>
// --- CORE CONFIG ---
const GROQ_KEY = "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";
const SB_URL = "https://mtczyuzbcunsflvcnatf.supabase.co";
const SB_KEY = "sb_secret_zNmUoxieIHwTqsNusdwNoA_GWLyAmys"; 

// Initialize Client Correctly
const _supabase = window.supabase.createClient(SB_URL, SB_KEY);

function toggleSidebar() { document.getElementById("sidebar").classList.toggle("closed"); }

function checkStaff() {
    const n = document.getElementById("userName").value.toLowerCase();
    const passArea = document.getElementById("staff-pass-area");
    if (n.includes("chethan") || n.includes("thaman") || n.includes("pavan")) {
        passArea.style.display = "block";
    } else { passArea.style.display = "none"; }
}

async function loginUser() {
    const name = document.getElementById("userName").value.trim();
    const pass = document.getElementById("staffPass").value.trim();
    const lowerName = name.toLowerCase();
    
    if(!name) return;

    let tier = "basic";
    if (lowerName.includes("chethan")) {
        if (pass !== "Chethan6912") return alert("Wrong Pin");
        tier = "founder";
    } else if (lowerName.includes("thaman") || lowerName.includes("pavan")) {
        if (pass !== "MythicalSv") return alert("Wrong Pin");
        tier = lowerName.includes("thaman") ? "admin" : "mod";
    }

    localStorage.setItem("myth_name", name);
    localStorage.setItem("myth_tier", tier);
    init();
}

async function init() {
    const name = localStorage.getItem("myth_name");
    if(name) {
        document.getElementById("login").style.display = "none";
        document.getElementById("sideName").innerText = name;
        const tier = localStorage.getItem("myth_tier");
        const b = document.getElementById("userTier");
        b.innerText = tier; b.className = `tier-badge badge-${tier}`;
        document.getElementById("userInit").innerText = name.charAt(0).toUpperCase();
        await fetchCloudHistory();
        newChat();
    }
}

async function fetchCloudHistory() {
    const name = localStorage.getItem("myth_name");
    const { data, error } = await _supabase.from('mythical_chats').select('*').eq('owner', name).order('created_at', { ascending: false });
    if (data) {
        document.getElementById("history").innerHTML = data.map(c => `
            <div class="history-item" onclick="loadCloudChat('${c.id}')">
                ☁️ ${c.title}
            </div>
        `).join('');
    }
}

let currentId = null;
let messages = [];

async function loadCloudChat(id) {
    const { data } = await _supabase.from('mythical_chats').select('*').eq('id', id).single();
    if (data) {
        currentId = data.id;
        messages = data.messages;
        document.getElementById("chat").innerHTML = "";
        messages.forEach(m => addMsg(m.content, m.role === "user"));
    }
}

function newChat() {
    currentId = null; messages = [];
    document.getElementById("chat").innerHTML = `<div style="text-align:center; margin-top:15vh;"><h1>Welcome, ${localStorage.getItem("myth_name")} ✨</h1><p style="color:#444;">Secure Cloud Sync Active.</p></div>`;
}

function addMsg(text, isUser) {
    const div = document.createElement("div");
    div.className = "msg " + (isUser ? "user" : "bot");
    div.innerText = (isUser ? "> " : "🤖 ") + text;
    document.getElementById("chat").appendChild(div);
    document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
}

async function send() {
    const input = document.getElementById("input");
    const text = input.value.trim();
    if(!text) return;

    addMsg(text, true);
    messages.push({role: "user", content: text});
    input.value = "";

    try {
        const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
            method: "POST",
            headers: { "Content-Type": "application/json", "Authorization": "Bearer " + GROQ_KEY },
            body: JSON.stringify({ 
                model: "llama-3.3-70b-versatile", 
                messages: [{role: "system", content: "You are Mythical AI by Mythical Studios. Owner: U. Chethan. Be helpful and professional."}, ...messages] 
            })
        });
        const data = await res.json();
        const reply = data.choices[0].message.content;
        addMsg(reply, false);
        messages.push({role: "assistant", content: reply});

        const name = localStorage.getItem("myth_name");
        
        // --- CLOUD SAVE LOGIC ---
        if (!currentId) {
            const { data: n, error } = await _supabase.from('mythical_chats').insert([
                { owner: name, title: text.substring(0, 18), messages: messages }
            ]).select();
            if (n) currentId = n[0].id;
        } else {
            await _supabase.from('mythical_chats').update({ messages: messages }).eq('id', currentId);
        }
        fetchCloudHistory();
    } catch (e) { addMsg("Sync Error. Check Database.", false); }
}

lucide.createIcons();
init();
</script>
</body>
</html>

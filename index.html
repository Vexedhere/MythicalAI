<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mythical AI | User Portal</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg: #0b0b0e; --sidebar-bg: #050507; --card: #16161a;
            --accent: #d4af37; --text: #ffffff; --text-dim: #9ca3af;
            --grad: linear-gradient(135deg, #d4af37 0%, #8a2be2 100%);
        }
        * { box-sizing: border-box; transition: all 0.2s ease; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; display: flex; }

        /* --- SIDEBAR --- */
        #sidebar { width: 280px; background: var(--sidebar-bg); border-right: 1px solid #222; display: flex; flex-direction: column; padding: 20px; z-index: 100; position: absolute; height: 100%; left: 0; }
        #sidebar.closed { left: -280px; }
        .new-chat-btn { background: #1f1f23; border: 1px solid #333; color: white; padding: 12px; border-radius: 12px; cursor: pointer; margin-bottom: 25px; width: 100%; font-weight: 600; }
        .history-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .history-item { padding: 12px; border-radius: 10px; font-size: 14px; color: var(--text-dim); cursor: pointer; background: rgba(255,255,255,0.02); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .history-item.active { background: rgba(212, 175, 55, 0.1); color: var(--accent); border: 1px solid rgba(212,175,55,0.3); }

        /* --- MAIN --- */
        #main-content { flex: 1; display: flex; flex-direction: column; width: 100%; height: 100%; margin-left: 280px; transition: 0.3s; }
        #main-content.full { margin-left: 0; }
        header { padding: 15px 25px; border-bottom: 1px solid #222; display: flex; align-items: center; justify-content: space-between; background: var(--bg); }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px 8%; display: flex; flex-direction: column; gap: 25px; }
        .msg { max-width: 85%; padding: 16px 20px; border-radius: 18px; font-size: 15px; line-height: 1.6; }
        .user-msg { align-self: flex-end; background: var(--grad); color: #000; font-weight: 500; border-bottom-right-radius: 2px; }
        .bot-msg { align-self: flex-start; background: #1c1c21; border: 1px solid #333; border-bottom-left-radius: 2px; }

        /* --- INPUT --- */
        .input-container { padding: 20px 8% 40px; }
        .input-box { background: #16161a; border: 1px solid #333; border-radius: 16px; display: flex; align-items: center; padding: 12px 18px; gap: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .chat-input { flex: 1; background: transparent; border: none; color: white; outline: none; font-size: 16px; }

        /* --- AUTH OVERLAY --- */
        #auth-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .login-card { width: 380px; background: var(--card); padding: 45px; border-radius: 24px; text-align: center; border: 1px solid #333; }
        .google-btn { background: white; color: black; border: none; padding: 14px; border-radius: 12px; font-weight: 700; width: 100%; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div style="font-weight: 900; color: var(--accent); margin-bottom: 30px; font-size: 22px;">MYTHICAL</div>
        <button class="new-chat-btn" onclick="startNewChat()">+ New Chat</button>
        <div class="history-list" id="history-list"></div>
        <button onclick="logout()" style="margin-top:20px; background:transparent; border:none; color: #444; cursor: pointer; font-size: 12px;">Sign Out</button>
    </div>

    <div id="auth-overlay">
        <div class="login-card">
            <div style="font-size: 40px; margin-bottom: 10px;">🛡️</div>
            <h2>Mythical Portal</h2>
            <p style="color:var(--text-dim); font-size: 13px;">Official Google Login for Users</p>
            <button class="google-btn" onclick="loginWithGoogle()">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_Logo.svg" width="20"> Continue with Google
            </button>
        </div>
    </div>

    <div id="main-content">
        <header>
            <div style="display: flex; align-items: center; gap: 15px;">
                <button onclick="toggleSidebar()" style="background:transparent; border:none; color:white; font-size:24px; cursor:pointer;">☰</button>
                <div id="active-title" style="font-weight: 600;">Chat Archives</div>
            </div>
            <div id="user-info" style="font-size: 12px; color: var(--accent);"></div>
        </header>
        <div id="chat-window"></div>
        <div class="input-container">
            <div class="input-box">
                <input type="text" id="user-input" class="chat-input" placeholder="Message Mythical Archives..." autocomplete="off">
                <button onclick="sendMessage()" style="background:var(--accent); border:none; padding:10px 18px; border-radius:10px; cursor:pointer; font-weight:bold;">➔</button>
            </div>
        </div>
    </div>

    <script>
        // --- 1. FIREBASE CONFIG (Using YOUR Keys) ---
        const firebaseConfig = {
            apiKey: "AIzaSyDk2Hylmbu4WIWtTn0JYPEmLYXGaad5um8",
            authDomain: "mythical-ai.firebaseapp.com",
            projectId: "mythical-ai",
            storageBucket: "mythical-ai.firebasestorage.app",
            messagingSenderId: "405366066284",
            appId: "1:405366066284:web:c7cbd9ce2ce7809db6dc49"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        // --- 2. GROQ CONFIG ---
        const GROQ_KEY = "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";
        const ENDPOINT = "https://api.groq.com/openai/v1/chat/completions";
        
        const SYSTEM = "You are the Mythical Network Assistant. Only discuss the Minecraft server (mc.mythicalstudios.online). No YouTubers. Short answers.";

        let currentUser = null;
        let activeChatId = "";
        let currentMessages = [];

        // --- AUTH LOGIC ---
        function loginWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).catch(err => alert("Login Error: " + err.message));
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('user-info').innerText = user.displayName;
                renderHistoryList();
                startNewChat();
            } else {
                document.getElementById('auth-overlay').style.display = 'flex';
            }
        });

        function logout() { auth.signOut().then(() => location.reload()); }

        function toggleSidebar() { 
            document.getElementById('sidebar').classList.toggle('closed');
            document.getElementById('main-content').classList.toggle('full');
        }

        // --- CHAT ENGINE ---
        async function sendMessage() {
            const text = document.getElementById('user-input').value.trim();
            if(!text || !currentUser) return;

            addMsg(text, true);
            const loadElem = addMsg("...", false);
            document.getElementById('user-input').value = "";
            currentMessages.push({role: "user", content: text});

            try {
                const res = await fetch(ENDPOINT, {
                    method: "POST",
                    headers: {"Content-Type":"application/json", "Authorization":`Bearer ${GROQ_KEY}`},
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [{role:"system", content:SYSTEM}, ...currentMessages],
                        temperature: 0.2
                    })
                });
                const data = await res.json();
                const reply = data.choices[0].message.content;
                loadElem.innerText = reply;
                currentMessages.push({role: "assistant", content: reply});

                // Save to User's Private Firebase Path
                const safeEmail = currentUser.email.replace(/\./g, ',');
                db.ref(`users/${safeEmail}/chats/${activeChatId}`).set({
                    title: currentMessages[0].content.substring(0, 20),
                    messages: currentMessages,
                    lastUpdated: Date.now()
                });
            } catch(e) { loadElem.innerText = "Error Connecting."; }
        }

        function addMsg(t, isU) {
            const d = document.createElement('div');
            d.className = `msg ${isU ? 'user-msg' : 'bot-msg'}`;
            d.innerText = t;
            const win = document.getElementById('chat-window');
            win.appendChild(d);
            win.scrollTop = win.scrollHeight;
            return d;
        }

        function startNewChat() {
            activeChatId = "chat_" + Date.now();
            currentMessages = [];
            document.getElementById('chat-window').innerHTML = "";
            addMsg(`Greetings, ${currentUser.displayName}. How can I help?`, false);
        }

        function loadChat(id, messages) {
            activeChatId = id;
            currentMessages = messages;
            document.getElementById('chat-window').innerHTML = "";
            currentMessages.forEach(m => addMsg(m.content, m.role === "user"));
        }

        function renderHistoryList() {
            const safeEmail = currentUser.email.replace(/\./g, ',');
            db.ref(`users/${safeEmail}/chats`).limitToLast(10).on('value', snapshot => {
                const list = document.getElementById('history-list');
                list.innerHTML = "";
                snapshot.forEach(child => {
                    const data = child.val();
                    const item = document.createElement('div');
                    item.className = `history-item ${child.key === activeChatId ? 'active' : ''}`;
                    item.innerText = data.title || "Archive";
                    item.onclick = () => loadChat(child.key, data.messages);
                    list.appendChild(item);
                });
            });
        }

        document.getElementById('user-input').onkeydown = (e) => { if(e.key === "Enter") sendMessage(); }
    </script>
</body>
</html>

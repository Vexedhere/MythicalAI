<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mythical AI | Elite Portal</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --p-purple: #7D2AE8; --dark-bg: #050505; --card-bg: #0D0D0D; --border: #1a1a1a; }
        body { margin:0; font-family: 'Inter', sans-serif; background:#000; color:#fff; display:flex; height: 100vh; overflow: hidden; }
        
        /* SIDEBAR */
        #sidebar { width:300px; background: var(--dark-bg); padding:20px; display:flex; flex-direction:column; border-right: 1px solid #111; gap: 12px; transition: 0.4s ease; position: relative; }
        #sidebar.closed { width: 0; padding: 0; overflow: hidden; border: none; }
        .logo-text { color: var(--p-purple); font-weight: 900; font-size: 1.2rem; letter-spacing: 3px; }

        /* BADGES */
        .tier-badge { font-size: 0.6rem; padding: 3px 8px; border-radius: 6px; font-weight: bold; margin-left: 8px; text-transform: uppercase; letter-spacing: 1px; }
        .badge-basic { background: #222; color: #888; border: 1px solid #333; }
        .badge-plus { background: #00c8ff; color: #000; }
        .badge-pro { background: var(--p-purple); color: #fff; animation: pulse-purple 2s infinite; }
        .badge-founder { background: linear-gradient(90deg, #FFD700, #FFA500); color: #000; animation: pulse-gold 2s infinite; border: 1px solid #FFF; }

        @keyframes pulse-gold { 0%, 100% { box-shadow: 0 0 5px rgba(255,215,0,0.4); } 50% { box-shadow: 0 0 20px rgba(255,215,0,0.8); } }
        @keyframes pulse-purple { 0%, 100% { box-shadow: 0 0 5px rgba(125,42,232,0.4); } 50% { box-shadow: 0 0 20px rgba(125,42,232,0.8); } }

        /* INPUT PILL */
        .input-container { position: absolute; bottom: 35px; left: 0; right: 0; display: flex; justify-content: center; z-index: 100; }
        .input-wrapper { width: 65%; background: rgba(15,15,15,0.8); backdrop-filter: blur(20px); border-radius: 50px; padding: 8px 12px 8px 25px; display: flex; align-items: center; border: 1px solid #222; }
        #input { flex:1; background:transparent; border:none; color:#fff; outline:none; font-size: 1rem; padding: 12px 0; }
        
        /* CHAT */
        #main { flex:1; display:flex; flex-direction:column; position: relative; }
        #chat { flex:1; overflow-y:auto; padding: 80px 15% 150px 15%; scroll-behavior: smooth; }
        .msg { max-width: 80%; margin: 20px 0; padding: 18px 24px; border-radius: 24px; animation: msgFade 0.4s ease; }
        .user { margin-left:auto; background: #111; border: 1px solid #222; }
        .bot { background: transparent; border-left: 2px solid var(--p-purple); padding-left: 25px; color: #ddd; }

        @keyframes msgFade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
        #sidebar-toggle { position: fixed; top: 20px; left: 20px; z-index: 1001; background: #111; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 12px; cursor: pointer; }
        #login { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; background:#000; z-index: 3000; }
    </style>
</head>
<body>

<button id="sidebar-toggle" onclick="toggleSidebar()"><i data-lucide="menu" size="20"></i></button>

<div id="login">
    <div style="background:#0D0D0D; padding:45px; border-radius:30px; border:1px solid #222; text-align:center; width:320px;">
        <h2 style="color:var(--p-purple); letter-spacing:3px;">MYTHICAL AI</h2>
        <input id="userName" style="width:90%; padding:15px; margin:10px 0; background:#000; border:1px solid #333; color:#fff; border-radius:14px; outline:none;" placeholder="Enter Name" oninput="checkFounder()">
        <input id="userEmail" type="email" style="width:90%; padding:15px; margin:10px 0; background:#000; border:1px solid #333; color:#fff; border-radius:14px; outline:none;" placeholder="Email Address">
        <div id="f-pass" style="display:none; margin-top:10px; border-top: 1px solid #222; padding-top: 10px;">
            <input id="founderPass" type="password" style="width:90%; padding:15px; background:#000; border:1px solid #FFD700; color:#fff; border-radius:14px;" placeholder="Founder Pin">
        </div>
        <button onclick="loginUser()" style="width:100%; padding:15px; background:var(--p-purple); color:#fff; border:none; border-radius:14px; cursor:pointer; font-weight:bold; margin-top:15px;">LOGIN</button>
    </div>
</div>

<div id="sidebar">
    <div style="cursor:pointer; padding: 10px 0;" onclick="location.reload()">
        <span class="logo-text">MYTHICAL AI</span>
    </div>
    
    <div style="background:#0A0A0A; padding:15px; border-radius:18px; border:1px solid var(--border);">
        <div style="font-size:0.6rem; color:var(--p-purple); font-weight:bold; text-transform:uppercase; margin-bottom:8px;">User Identity 🛡️</div>
        <div style="display: flex; align-items: center; gap: 12px;">
            <div id="userInit" style="width:36px; height:36px; background:var(--p-purple); border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:bold;">?</div>
            <div>
                <div style="display:flex; align-items:center;">
                    <span id="sideName" style="font-size:0.9rem; font-weight:bold;">Guest</span>
                    <span id="userTier" class="tier-badge badge-basic">BASIC</span>
                </div>
                <div id="sideMail" style="font-size:0.7rem; color:#444;">user@mythical.ai</div>
            </div>
        </div>
    </div>

    <button onclick="newChat()" style="width:100%; padding:12px; background:transparent; border:1px solid #222; color:#fff; border-radius:12px; cursor:pointer; margin-top: 10px;">+ New AI Thread</button>
    <div id="history" style="flex:1; overflow-y:auto; margin:10px 0;"></div>
    <button onclick="localStorage.clear(); location.reload();" style="color:#ff4444; background:none; border:none; cursor:pointer; font-size:0.7rem; opacity:0.4;">Logout</button>
</div>

<div id="main">
    <div id="chat"></div>
    <div class="input-container">
        <div class="input-wrapper">
            <input id="input" placeholder="Ask Mythical AI..." onkeydown="if(event.key==='Enter') send()">
            <button onclick="send()" style="background:var(--p-purple); color:white; border:none; width:45px; height:45px; border-radius:50%; cursor:pointer;"><i data-lucide="arrow-up" size="22"></i></button>
        </div>
    </div>
</div>

<script>
const GROQ_KEY = "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";

function toggleSidebar() { document.getElementById("sidebar").classList.toggle("closed"); }

function checkFounder() {
    const n = document.getElementById("userName").value.toLowerCase();
    document.getElementById("f-pass").style.display = n.includes("chethan") ? "block" : "none";
}

// EMAIL VALIDATION FUNCTION
function validateEmail(email) {
    return email.includes("@") && email.includes(".");
}

function loginUser() {
    const name = document.getElementById("userName").value.trim();
    const mail = document.getElementById("userEmail").value.trim();
    const pass = document.getElementById("founderPass").value.trim();

    // 1. Check if empty
    if(!name || !mail) { alert("Please enter both Name and Email."); return; }

    // 2. Validate Email format
    if(!validateEmail(mail)) { alert("Please enter a valid email address (example@gmail.com)"); return; }

    // 3. Founder Check
    if (name.toLowerCase().includes("chethan")) {
        if (pass !== "Chethan6912") { alert("Access Denied. Founder Pin Incorrect."); return; }
        localStorage.setItem("myth_tier", "founder");
    } else { 
        localStorage.setItem("myth_tier", "basic"); 
    }

    localStorage.setItem("myth_name", name); 
    localStorage.setItem("myth_mail", mail); 
    init();
}

function init() {
    const name = localStorage.getItem("myth_name");
    const mail = localStorage.getItem("myth_mail");
    const tier = localStorage.getItem("myth_tier") || "basic";
    if(name) {
        document.getElementById("sideName").innerText = name;
        document.getElementById("sideMail").innerText = mail;
        document.getElementById("userInit").innerText = name.charAt(0).toUpperCase();
        const b = document.getElementById("userTier");
        b.innerText = tier;
        b.className = `tier-badge badge-${tier}`;
        document.getElementById("login").style.display = "none";
        renderHist(); newChat();
    }
}

let messages = [];

function renderHist() {
    const box = document.getElementById("history");
    const user = localStorage.getItem("myth_name");
    let h = JSON.parse(localStorage.getItem("myth_ai_v16") || "[]");
    box.innerHTML = h.filter(i => i.owner === user).map(c => `<div style="padding:12px; color:#555; cursor:pointer; font-size:0.85rem;" onclick="loadChat('${c.id}')">🤖 ${c.title}</div>`).join('');
}

function loadChat(id) {
    let h = JSON.parse(localStorage.getItem("myth_ai_v16") || "[]");
    const c = h.find(i => i.id === id);
    if(c) {
        messages = c.messages;
        document.getElementById("chat").innerHTML = "";
        messages.forEach(m => addMsg(m.content, m.role === "user"));
    }
}

function newChat() {
    messages = [];
    const name = localStorage.getItem("myth_name") || "User";
    document.getElementById("chat").innerHTML = `<div style="text-align:center; margin-top:15vh;"><h1>Welcome, ${name} ✨</h1><p style="color:#444;">Mythical AI Core Online.</p></div>`;
}

function addMsg(text, isUser) {
    const div = document.createElement("div");
    div.className = "msg " + (isUser ? "user" : "bot");
    div.innerText = (isUser ? "> " : "🤖 ") + text;
    const chat = document.getElementById("chat");
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

async function send() {
    const input = document.getElementById("input");
    const text = input.value.trim();
    if(!text) return;

    const currentUserName = localStorage.getItem("myth_name") || "User";

    addMsg(text, true);
    messages.push({role: "user", content: text});
    input.value = "";

    try {
        const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
            method: "POST",
            headers: { "Content-Type": "application/json", "Authorization": "Bearer " + GROQ_KEY },
            body: JSON.stringify({ 
                model: "llama-3.3-70b-versatile", 
                messages: [
                    {role: "system", content: `You are Mythical AI. Owner: U. Chethan. Father: Rangaswamy. Mother: Bhargavi. Sister: Sudhishna. You are currently talking to: ${currentUserName}. Address them by their name if they ask who they are. Use emojis. ✨`}, 
                    ...messages
                ] 
            })
        });
        const data = await res.json();
        const reply = data.choices[0].message.content;
        addMsg(reply, false);
        messages.push({role: "assistant", content: reply});

        if(messages.length === 2) {
            let h = JSON.parse(localStorage.getItem("myth_ai_v16") || "[]");
            h.unshift({ id: Date.now().toString(), owner: currentUserName, title: text.substring(0,18), messages: [...messages] });
            localStorage.setItem("myth_ai_v16", JSON.stringify(h));
            renderHist();
        }
    } catch { addMsg("ERR: Sync Failed. 🛑", false); }
}

lucide.createIcons();
init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mythical AI | Trinity Portal</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --p-purple: #7D2AE8; --dark-bg: #050505; --border: #1a1a1a; --glass: rgba(255, 255, 255, 0.03); }
        * { box-sizing: border-box; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
        body { margin:0; font-family: 'Inter', -apple-system, sans-serif; background:#000; color:#fff; display:flex; height: 100vh; overflow: hidden; }
        
        /* --- LOGIN GATE --- */
        #login-gate { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; background:#000; z-index: 9999; }
        .gate-card { background:#0D0D0D; padding:40px; border-radius:30px; border:1px solid #222; text-align:center; width:min(95%, 380px); box-shadow: 0 0 50px rgba(125, 42, 232, 0.1); }
        .logo-text { color: var(--p-purple); font-weight: 900; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 20px; }
        input.gate-input { width:100%; padding:14px; margin:8px 0; background:#000; border:1px solid #222; color:#fff; border-radius:12px; outline:none; }
        .gate-btn { width:100%; padding:14px; background:var(--p-purple); color:#fff; border:none; border-radius:12px; cursor:pointer; font-weight:bold; margin-top:20px; }

        /* --- APP STRUCTURE --- */
        #app { display:none; flex:1; height: 100vh; width: 100%; }
        #sidebar { width:280px; background: var(--dark-bg); padding:24px; border-right: 1px solid var(--border); display:flex; flex-direction:column; gap: 20px; }
        #main-content { flex:1; display:flex; flex-direction:column; position: relative; background: #000; }

        /* TOP BAR */
        .top-bar { height: 60px; display: flex; align-items: center; justify-content: flex-end; padding: 0 30px; border-bottom: 1px solid #111; }
        .logout-pill { background: rgba(255,255,255,0.05); border: 1px solid #333; color: #fff; padding: 8px 18px; border-radius: 30px; cursor: pointer; font-size: 0.75rem; display: flex; align-items: center; gap: 10px; }
        .logout-pill:hover { background: #ff4444; border-color: #ff4444; }

        /* CHAT UI */
        #chat { flex:1; overflow-y:auto; padding: 80px 18% 150px 18%; scroll-behavior: smooth; }
        .msg { max-width: 85%; margin: 24px 0; padding: 18px; border-radius: 20px; line-height: 1.7; font-size: 0.95rem; }
        .bot { border-left: 2.5px solid var(--p-purple); color: #ccc; padding-left: 20px; }
        .user { margin-left:auto; background: #111; border: 1px solid #222; }

        /* INPUT AREA */
        .input-area { position: absolute; bottom: 40px; left: 0; right: 0; padding: 0 18%; }
        .input-wrap { background: rgba(10,10,10,0.85); backdrop-filter: blur(30px); border: 1px solid #222; border-radius: 40px; padding: 10px 15px 10px 30px; display: flex; align-items: center; }
        #chat-input { flex:1; background:transparent; border:none; color:#fff; outline:none; }

        /* UPGRADE MODAL */
        #upgrade-screen { position: fixed; inset: 0; background: rgba(0,0,0,0.96); z-index: 10000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(25px); }
        .plan-card { background: #0D0D0D; border: 1px solid #222; padding: 35px; border-radius: 35px; width: 340px; text-align: center; margin: 15px; }
        .price { font-size: 3rem; font-weight: 900; margin: 15px 0; }
        .buy-btn { width: 100%; padding: 14px; border-radius: 15px; border: none; font-weight: 900; cursor: pointer; text-transform: uppercase; }

        @media (max-width: 768px) { #sidebar { display: none; } #chat { padding: 80px 5%; } .input-area { padding: 0 5%; } }
    </style>
</head>
<body>

<div id="g_id_onload" data-client_id="YOUR_GOOGLE_CLIENT_ID" data-callback="handleGoogle"></div>

<div id="login-gate">
    <div class="gate-card">
        <h2 class="logo-text">MYTHICAL AI</h2>
        <div class="g_id_signin" data-type="standard" data-theme="filled_black" style="margin-bottom: 20px; display: flex; justify-content: center;"></div>
        <div style="color:#222; font-size: 0.6rem; margin-bottom: 15px;">— STAFF & GUEST ACCESS —</div>
        <input id="loginName" class="gate-input" placeholder="Full Name" oninput="checkStaffSense()">
        <input id="loginEmail" class="gate-input" type="email" placeholder="Email Address">
        <div id="staff-pin-box" style="display:none;">
            <input id="staffPass" class="gate-input" type="password" placeholder="Staff Security Key">
        </div>
        <div id="user-pass-box">
            <input id="userPass" class="gate-input" type="password" placeholder="Password">
        </div>
        <button class="gate-btn" onclick="executeLogin()">UNLOCK SYSTEM</button>
    </div>
</div>

<div id="upgrade-screen">
    <div style="position: absolute; top: 30px; right: 30px; cursor: pointer;" onclick="toggleUpgrade(false)"><i data-lucide="x-circle" size="35"></i></div>
    <div class="plan-card">
        <div style="color:#666; font-size:0.7rem; font-weight:900;">PLUS TIER</div>
        <div class="price">₹199<span style="font-size: 0.8rem;">/mo</span></div>
        <p style="font-size: 0.8rem; color: #555;">HD Image Gen • Llama-3.3 Ultra • Early Access</p>
        <button class="buy-btn" style="background:#fff; color:#000;" onclick="pay(199, 'Plus')">GET PLUS</button>
    </div>
    <div class="plan-card" style="border-color: var(--p-purple); box-shadow: 0 0 40px rgba(125, 42, 232, 0.2);">
        <div style="color:var(--p-purple); font-size:0.7rem; font-weight:900;">PRO TIER</div>
        <div class="price">₹399<span style="font-size: 0.8rem;">/mo</span></div>
        <p style="font-size: 0.8rem; color: #555;">4K Video Gen • Voice Cloning • Unlimited AI</p>
        <button class="buy-btn" style="background:var(--p-purple); color:#fff;" onclick="pay(399, 'Pro')">GET PRO</button>
    </div>
</div>

<div id="app">
    <div id="sidebar">
        <div class="logo-text">MYTHICAL AI</div>
        <button onclick="location.reload()" style="background:transparent; border:none; color:#fff; cursor:pointer; text-align:left;"><i data-lucide="plus"></i> New Thread</button>
        <div style="background: #0D0D0D; border: 1px solid #222; padding: 25px; border-radius: 25px; margin-top: auto; text-align: center;">
            <p style="font-size: 0.75rem;">Unlock Image & Video</p>
            <button class="gate-btn" style="margin-top: 10px; font-size: 0.7rem;" onclick="toggleUpgrade(true)">UPGRADE NOW</button>
        </div>
        <div style="display: flex; align-items: center; gap: 10px; padding-top: 10px; border-top: 1px solid #111;">
            <div id="avatar" style="width: 35px; height: 35px; background: var(--p-purple); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold;">?</div>
            <div>
                <div id="uName" style="font-size: 0.85rem; font-weight: bold;">User</div>
                <div id="uTier" style="font-size: 0.65rem; color: #FFD700; font-weight: 800;">BASIC</div>
            </div>
        </div>
    </div>

    <div id="main-content">
        <div class="top-bar">
            <div class="logout-pill" onclick="logout()">
                <i data-lucide="log-out" size="14"></i> Log out
            </div>
        </div>
        <div id="chat">
            <div class="msg bot">Cloud Core Synchronized. Standing by, Founder.</div>
        </div>
        <div class="input-area">
            <div class="input-wrap">
                <input id="chat-input" placeholder="Transmit instruction..." onkeydown="if(event.key==='Enter') send()">
                <button onclick="send()" style="background:#fff; border:none; width:45px; height:45px; border-radius:50%; cursor:pointer;"><i data-lucide="arrow-up" color="#000" size="20"></i></button>
            </div>
        </div>
    </div>
</div>

<script>
    const GROQ_KEY = "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";
    
    // --- 🛡️ SQUAD DATABASE & KNOWLEDGE ---
    const staffDB = { "chethan": "C@MN", "thaman": "T@MN", "pavan": "P@MN" };
    const MYTHICAL_SYSTEM_PROMPT = `
        You are Mythical AI, an elite assistant created by U. Chethan.
        KNOWLEDGE BASE:
        - Founder: U. Chethan (10th Grade, Owner of Mythical Studios).
        - Core Staff: Thaman (Admin), Pavan (Moderator).
        - Project: Mythical Network (Minecraft Server launching April 20, 2026).
        - Tone: High-tech, respectful to staff, helpful to 10th-grade peers.
    `;

    function checkStaffSense() {
        const name = document.getElementById("loginName").value.toLowerCase().trim();
        const isStaff = !!staffDB[name];
        document.getElementById("staff-pin-box").style.display = isStaff ? "block" : "none";
        document.getElementById("user-pass-box").style.display = isStaff ? "none" : "block";
    }

    function executeLogin() {
        const name = document.getElementById("loginName").value.toLowerCase().trim();
        if (staffDB[name]) {
            if (document.getElementById("staffPass").value === staffDB[name]) loginSuccess(name, "FOUNDER");
            else alert("INVALID KEY");
        } else {
            const email = document.getElementById("loginEmail").value;
            if (email.includes("@")) loginSuccess(name || "Guest", "BASIC TIER");
            else alert("Valid email required");
        }
    }

    function handleGoogle(r) {
        const p = JSON.parse(atob(r.credential.split('.')[1]));
        loginSuccess(p.name, "BASIC TIER");
    }

    function loginSuccess(name, tier) {
        localStorage.setItem("myth_auth", "true");
        localStorage.setItem("myth_name", name);
        localStorage.setItem("myth_tier", tier);
        renderApp();
    }

    function renderApp() {
        document.getElementById("login-gate").style.display = "none";
        document.getElementById("app").style.display = "flex";
        document.getElementById("uName").innerText = localStorage.getItem("myth_name").toUpperCase();
        document.getElementById("avatar").innerText = localStorage.getItem("myth_name").charAt(0).toUpperCase();
        document.getElementById("uTier").innerText = (localStorage.getItem("myth_name").toLowerCase() === "chethan") ? "FOUNDER" : localStorage.getItem("myth_tier");
    }

    function logout() { localStorage.clear(); location.reload(); }
    function toggleUpgrade(s) { document.getElementById("upgrade-screen").style.display = s ? "flex" : "none"; }
    function pay(a, p) { window.location.href = `upi://pay?pa=bargavi124@ybl&pn=Mythical%20AI&am=${a}&tn=Upgrade%20to%20${p}&cu=INR`; }

    async function send() {
        const i = document.getElementById("chat-input");
        const t = i.value.trim(); if(!t) return;
        const c = document.getElementById("chat");
        c.innerHTML += `<div class="msg user">${t}</div>`;
        i.value = "";
        try {
            const r = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${GROQ_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify({ 
                    model: "llama-3.3-70b-versatile", 
                    messages: [
                        {role: "system", content: MYTHICAL_SYSTEM_PROMPT},
                        {role: "user", content: t}
                    ] 
                })
            });
            const d = await r.json();
            c.innerHTML += `<div class="msg bot">${d.choices[0].message.content}</div>`;
        } catch(e) { c.innerHTML += `<div class="msg bot">Connection Error.</div>`; }
        c.scrollTop = c.scrollHeight;
    }

    window.onload = () => { if(localStorage.getItem("myth_auth")) renderApp(); lucide.createIcons(); };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mythical AI | Enterprise Core</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        :root { --p-purple: #7D2AE8; --dark-bg: #050505; }
        body { background-color: #000; color: #e5e5e5; font-family: 'Space Grotesk', sans-serif; overflow: hidden; height: 100vh; display: flex; }
        
        /* Mobile Sidebar Overlay */
        @media (max-width: 768px) {
            #sidebar { position: fixed; left: -300px; top: 0; bottom: 0; z-index: 10000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
            #sidebar.open { left: 0; }
            #sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 9999; }
            #sidebar-overlay.open { display: block; }
            #chat { padding: 40px 5% 150px 5% !important; }
            .input-area { padding: 0 5% !important; bottom: 20px !important; }
        }

        #welcome-overlay { position: fixed; inset: 0; background: #000; z-index: 15000; display: none; align-items: center; justify-content: center; text-align: center; flex-direction: column; transition: opacity 0.5s; }
        .welcome-title { font-size: 2.5rem; font-weight: 900; color: var(--p-purple); text-transform: uppercase; letter-spacing: 5px; }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-10px); } 40%, 80% { transform: translateX(10px); } }
        .breach-alert { animation: shake 0.4s both; border-color: #ff0000 !important; color: #ff4d4d; }

        #sidebar { width: 300px; background: var(--dark-bg); border-right: 1px solid #1a1a1a; display: flex; flex-direction: column; padding: 24px; }
        #chat-history { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; margin-top: 20px; }
        .history-btn { background: #0D0D0D; border: 1px solid #1a1a1a; color: #888; padding: 12px; border-radius: 12px; cursor: pointer; text-align: left; font-size: 0.8rem; display: flex; align-items: center; gap: 8px; transition: 0.2s; }
        .active-chat { border-color: var(--p-purple); color: #fff; background: rgba(125, 42, 232, 0.05); }

        #chat { flex: 1; overflow-y: auto; padding: 60px 15% 150px 15%; scroll-behavior: smooth; }
        .msg { position: relative; max-width: 90%; margin: 20px 0; padding: 18px; border-radius: 20px; line-height: 1.6; font-size: 0.9rem; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .bot { border-left: 4px solid var(--p-purple); background: rgba(125, 42, 232, 0.02); }
        .user { margin-left: auto; background: #0D0D0D; border: 1px solid #1A1A1A; }
        
        .trash-btn { position: absolute; top: 10px; right: 10px; opacity: 0; cursor: pointer; color: #444; background: transparent; border: none; }
        .msg:hover .trash-btn { opacity: 1; }

        .input-area { position: absolute; bottom: 40px; left: 0; right: 0; padding: 0 15%; z-index: 50; }
        .input-wrap { background: rgba(15, 15, 15, 0.95); backdrop-filter: blur(20px); border: 1px solid #222; border-radius: 35px; padding: 8px 10px 8px 25px; display: flex; align-items: center; }
        #chat-input { flex: 1; background: transparent; border: none; color: #fff; outline: none; font-size: 0.95rem; }
        
        #chat::-webkit-scrollbar { width: 3px; }
        #chat::-webkit-scrollbar-thumb { background: var(--p-purple); border-radius: 10px; }
        
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .loader-spin { animation: spin 1s linear infinite; }
    </style>
</head>
<body>

    <div id="welcome-overlay">
        <div class="welcome-title" id="welcome-text">INITIALIZING</div>
        <div class="text-gray-500 font-bold tracking-[3px] text-xs mt-2 uppercase">Mythical AI Cloud Core</div>
    </div>

    <div id="sidebar-overlay" onclick="toggleSidebar()"></div>

    <div id="login-gate" class="fixed inset-0 flex items-center justify-center bg-black z-[9999]">
        <div class="w-full max-w-sm text-center p-8 bg-[#0D0D0D] border border-[#222] rounded-[30px]">
            <h2 class="text-2xl font-black mb-8 tracking-widest text-purple-600 uppercase">Mythical AI</h2>
            <div id="input-wrapper" class="relative">
                <input type="password" id="security-key" class="w-full bg-transparent border-b-2 border-gray-700 py-3 px-2 text-xl text-center focus:outline-none focus:border-purple-500 transition-colors tracking-widest" placeholder="ADMIN KEY" onkeydown="if(event.key==='Enter') verifyKey()">
                <button onclick="verifyKey()" class="mt-6 px-10 py-3 bg-white text-black font-bold rounded-full hover:bg-gray-200 transition-all uppercase text-[10px] tracking-widest">VALIDATE</button>
                <p id="feedback" class="mt-4 font-bold text-red-500 hidden text-[10px] uppercase">BREACH DETECTED</p>
            </div>
        </div>
    </div>

    <div id="app" class="hidden flex-1 flex h-screen w-full">
        <aside id="sidebar">
            <div class="flex items-center gap-4 mb-8">
                <div class="w-10 h-10 bg-purple-600 rounded-xl flex items-center justify-center shadow-lg"><i data-lucide="dragon" class="text-white w-6 h-6"></i></div>
                <div class="flex flex-col"><h1 class="text-md font-black text-white leading-none">Mythical AI</h1><span class="text-[7px] text-purple-500 font-bold uppercase tracking-[2px] mt-1">L10 Enterprise</span></div>
            </div>
            <button class="flex items-center gap-3 w-full p-3 bg-white/5 border border-white/10 rounded-xl font-bold text-xs hover:border-purple-500 transition-all mb-4" onclick="newChat()"><i data-lucide="plus-circle" size="16"></i> New Transmission</button>
            <div id="chat-history"></div>
            <div class="mt-auto pt-4 flex items-center gap-4 border-t border-white/5">
                <div id="avatar" class="w-10 h-10 bg-purple-600 rounded-full flex items-center justify-center font-black uppercase text-white shadow-lg">?</div>
                <div><div id="uName" class="text-xs font-black uppercase">USER</div><div id="uTier" class="text-[8px] font-black tracking-[1px] uppercase italic">NODE ACTIVE</div></div>
            </div>
            <button onclick="logout()" class="mt-4 text-[9px] font-black text-red-500 uppercase flex items-center gap-2 opacity-50 hover:opacity-100 transition"><i data-lucide="power" size="10"></i> Terminate</button>
        </aside>

        <main id="main-content" class="flex-1 flex flex-col relative">
            <header class="md:hidden flex items-center p-4 border-b border-white/5 bg-black/50 backdrop-blur-md">
                <button onclick="toggleSidebar()"><i data-lucide="menu" class="text-purple-500"></i></button>
                <div class="flex-1 text-center text-[10px] font-black tracking-widest text-purple-400 uppercase">Neural Link Established</div>
            </header>
            <div id="chat"></div>
            <div class="input-area">
                <div class="input-wrap">
                    <input id="chat-input" placeholder="Neural command..." onkeydown="if(event.key==='Enter') startNeuralProcess()">
                    <button onclick="startNeuralProcess()" class="w-10 h-10 bg-white rounded-full flex items-center justify-center hover:scale-105 transition-all"><i data-lucide="zap" color="#000" size="18"></i></button>
                </div>
            </div>
        </main>
    </div>

<script>
    const GROQ_KEY = "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";
    const AUTHORIZED_KEYS = { "C@MN26": "U. CHETHAN", "T@MN26": "THAMAN", "P@MN26": "PAVAN" };
    const KNOWLEDGE = "You are Mythical AI, a personal assistant for U. Chethan, who is in 10th grade. IMPORTANT: Do not mention Minecraft or the Mythical Network server unless the user explicitly asks about it. Once asked, you can discuss projects like the Mythical Network (April 20 launch), Mythical Studios, and game modes like Lifesteal, Bedwars, or Skyblock. Your team includes Thaman (Admin) and Pavan (Moderator). Be professional and helpful.";

    let currentChatId = null;
    let chats = JSON.parse(localStorage.getItem("myth_chats") || "{}");

    window.onload = () => {
        const savedName = localStorage.getItem('myth_session_name');
        if(savedName) loginSuccess(savedName, true);
        lucide.createIcons();
    };

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('sidebar-overlay').classList.toggle('open');
    }

    function verifyKey() {
        const key = document.getElementById('security-key').value.trim();
        const wrapper = document.getElementById('input-wrapper');
        const feedback = document.getElementById('feedback');
        if (AUTHORIZED_KEYS[key]) loginSuccess(AUTHORIZED_KEYS[key]);
        else {
            wrapper.classList.add('breach-alert');
            feedback.classList.remove('hidden');
            setTimeout(() => { wrapper.classList.remove('breach-alert'); feedback.classList.add('hidden'); }, 2000);
        }
    }

    function loginSuccess(name, isRefresh=false) {
        localStorage.setItem('myth_session_name', name);
        document.getElementById('login-gate').style.display = 'none';
        if(!isRefresh) {
            const w = document.getElementById("welcome-overlay");
            w.style.display = "flex";
            document.getElementById("welcome-text").innerText = name.includes("CHETHAN") ? "FOUNDER MODE" : "WELCOME, " + name;
            setTimeout(() => { w.style.opacity = "0"; setTimeout(() => { w.style.display = "none"; launchApp(name); }, 500); }, 2500);
        } else launchApp(name);
    }

    function launchApp(name) {
        document.getElementById('app').classList.remove('hidden');
        const lowName = name.toLowerCase().trim();
        const uName = document.getElementById('uName');
        const uTier = document.getElementById('uTier');
        const avatar = document.getElementById('avatar');

        uName.innerText = name;
        avatar.innerText = name.charAt(0);

        if (lowName.includes("chethan")) {
            uTier.innerText = "FOUNDER CLEARANCE";
            uTier.style.color = "#FFD700";
        } else if (lowName.includes("thaman") || lowName.includes("pavan")) {
            uTier.innerText = "STAFF CLEARANCE";
            uTier.style.color = "#00E5FF";
        }
        renderHistory();
        const keys = Object.keys(chats);
        if (keys.length > 0) loadChat(keys[keys.length - 1]);
        else newChat();
        lucide.createIcons();
    }

    function logout() { localStorage.clear(); location.reload(); }

    function renderHistory() {
        const container = document.getElementById("chat-history");
        container.innerHTML = "";
        Object.keys(chats).reverse().forEach(id => {
            const btn = document.createElement("button");
            btn.className = "history-btn" + (id === currentChatId ? " active-chat" : "");
            btn.innerHTML = `<i data-lucide="message-square" size="12"></i> ${chats[id][0]?.user?.slice(0, 18) || "New Chat"}...`;
            btn.onclick = () => { loadChat(id); if(window.innerWidth < 768) toggleSidebar(); };
            container.appendChild(btn);
        });
        lucide.createIcons();
    }

    function loadChat(id) {
        currentChatId = id;
        const box = document.getElementById("chat");
        box.innerHTML = "";
        chats[id].forEach(m => { addMsg(m.user, true, null); addMsg(m.bot, false, m.img); });
        renderHistory();
    }

    function newChat() {
        currentChatId = "chat_" + Date.now();
        chats[currentChatId] = [];
        localStorage.setItem("myth_chats", JSON.stringify(chats));
        renderHistory();
        document.getElementById("chat").innerHTML = "";
        addMsg(`Neural link restored. Standing by, ${localStorage.getItem("myth_session_name")}.`, false);
    }

    function startNeuralProcess() {
        const inp = document.getElementById('chat-input');
        const val = inp.value.trim(); if(!val) return;
        const isImg = ["image", "draw", "generate", "render", "pic", "photo"].some(k => val.toLowerCase().includes(k));
        addMsg(val, true);
        inp.value = "";
        if (isImg) triggerVisual(val);
        else triggerChat(val);
    }

    async function triggerChat(text) {
        try {
            const r = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${GROQ_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: [{ role: "system", content: KNOWLEDGE }, { role: "user", content: text }] })
            });
            const d = await r.json();
            const reply = d.choices[0].message.content;
            addMsg(reply, false);
            chats[currentChatId].push({ user: text, bot: reply });
            localStorage.setItem("myth_chats", JSON.stringify(chats));
            renderHistory();
        } catch(e) { addMsg("⚠️ Node timeout.", false); }
    }

    function triggerVisual(p) {
        const url = `https://gen.pollinations.ai/image/${encodeURIComponent(p)}?model=flux&width=1024&height=1024&nologo=true&seed=${Math.floor(Math.random()*1000000)}`;
        addMsg(`Generating visual node: "${p}"`, false, url);
        chats[currentChatId].push({ user: p, bot: "Visual rendered.", img: url });
        localStorage.setItem("myth_chats", JSON.stringify(chats));
        renderHistory();
    }

    function addMsg(text, isUser, img = null) {
        if(!text) return;
        const box = document.getElementById('chat');
        const div = document.createElement('div');
        const mid = "msg_" + Math.random().toString(36).substr(2, 5);
        div.id = mid;
        div.className = `msg ${isUser ? 'user' : 'bot'}`;
        div.innerHTML = `
            <button class="trash-btn" onclick="this.parentElement.remove()"><i data-lucide="trash-2" size="12"></i></button>
            <p>${text}</p>
            ${img ? `
                <div class="mt-4 rounded-xl overflow-hidden border border-white/10 relative group bg-white/5 min-h-[250px] flex flex-col items-center justify-center">
                    <div id="ld-${mid}" class="flex flex-col items-center gap-2">
                        <div class="w-6 h-6 border-2 border-purple-600 border-t-transparent rounded-full loader-spin"></div>
                        <div class="text-[8px] font-bold text-purple-500 uppercase tracking-widest animate-pulse">Establishing Node...</div>
                    </div>
                    <img src="${img}" class="w-full relative z-10 opacity-0 transition-opacity duration-700 absolute inset-0" onload="document.getElementById('ld-${mid}').remove(); this.style.opacity='1';">
                    <a href="${img}" target="_blank" download class="absolute top-2 right-2 z-20 bg-purple-600 text-white p-2 rounded-lg opacity-0 group-hover:opacity-100 transition-all"><i data-lucide="download" size="14"></i></a>
                </div>
            ` : ''}`;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
        lucide.createIcons();
    }
</script>
</body>
</html>

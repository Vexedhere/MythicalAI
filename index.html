<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mythical AI | Trinity Portal</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --p-purple: #7D2AE8; --dark-bg: #050505; --card-bg: #0D0D0D; --border: #1a1a1a; }
        body { margin:0; font-family: 'Inter', sans-serif; background:#000; color:#fff; display:flex; height:100vh; overflow: hidden; }
        
        /* LOGIN OVERLAY */
        #login { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; background:#000; z-index: 3000; }
        .login-card { background:#0D0D0D; padding:40px; border-radius:30px; border:1px solid #222; text-align:center; width:340px; box-shadow: 0 0 50px rgba(125, 42, 232, 0.1); }
        .auth-btn { width:100%; padding:14px; border:none; border-radius:12px; cursor:pointer; font-weight:bold; display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:12px; transition: 0.3s; font-family: inherit; }
        .btn-google { background:#fff; color:#000; }
        .btn-github { background:#24292e; color:#fff; }
        .btn-email { background: var(--p-purple); color:#fff; margin-top: 10px; }
        
        input.auth-input { width:90%; padding:14px; margin:5px 0; background:#000; border:1px solid #222; color:#fff; border-radius:12px; outline:none; font-family: inherit; }
        .pass-wrap { position: relative; width: 100%; display: flex; align-items: center; justify-content: center; }
        .eye-btn { position: absolute; right: 15px; color: #444; cursor: pointer; border:none; background:none; }

        /* APP LAYOUT */
        #app { display:none; flex:1; height: 100vh; width: 100%; }
        #sidebar { width:280px; background: var(--dark-bg); padding:20px; display:flex; flex-direction:column; border-right: 1px solid #111; gap: 15px; }
        .logo-text { color: var(--p-purple); font-weight: 900; font-size: 1.1rem; letter-spacing: 3px; margin-bottom: 10px; }
        
        /* STAFF BADGES */
        .tier-badge { font-size: 0.6rem; padding: 3px 8px; border-radius: 6px; font-weight: bold; margin-top: 4px; display: inline-block; text-transform: uppercase; border: 1px solid rgba(255,255,255,0.1); }
        .badge-founder { background: linear-gradient(90deg, #FFD700, #FFA500); color: #000; animation: pulse-gold 2s infinite; }
        .badge-admin { background: #ff4444; color: #fff; }
        .badge-mod { background: #00ffcc; color: #000; }
        @keyframes pulse-gold { 0%, 100% { box-shadow: 0 0 5px rgba(255,215,0,0.3); } 50% { box-shadow: 0 0 15px rgba(255,215,0,0.6); } }

        /* CHAT AREA */
        #main { flex:1; display:flex; flex-direction:column; background: #000; position: relative; }
        #chat { flex:1; overflow-y:auto; padding: 40px 15% 120px 15%; scroll-behavior: smooth; }
        .msg { max-width: 80%; margin: 20px 0; padding: 16px 22px; border-radius: 20px; line-height: 1.6; font-size: 0.95rem; }
        .user { margin-left:auto; background: #111; border: 1px solid #222; }
        .bot { background: transparent; border-left: 2px solid var(--p-purple); color: #ddd; padding-left: 20px; border-radius: 0; }
    </style>
</head>
<body>

<div id="login">
    <div class="login-card">
        <h2 style="color:var(--p-purple); letter-spacing:3px; margin-bottom:30px; font-weight: 900;">MYTHICAL AI</h2>
        <button class="auth-btn btn-google" onclick="loginWith('google')">Google Login</button>
        <button class="auth-btn btn-github" onclick="loginWith('github')">GitHub Login</button>
        <div style="color:#333; font-size:0.7rem; margin:20px 0;">— STAFF ACCESS —</div>
        
        <input id="staffName" class="auth-input" type="text" placeholder="Your Name">
        <input id="email" class="auth-input" type="email" placeholder="Email">
        
        <div class="pass-wrap">
            <input id="pass" class="auth-input" type="password" placeholder="Password">
            <button class="eye-btn" onclick="togglePass()"><i id="eyeIcon" data-lucide="eye" style="width:18px"></i></button>
        </div>
        <button class="auth-btn btn-email" onclick="emailLogin()">ENTER</button>
        <p style="font-size: 0.6rem; color: #444; cursor: pointer; margin-top: 10px;" onclick="signup()">New Staff? Register</p>
    </div>
</div>

<div id="app">
    <div id="sidebar">
        <div class="logo-text">MYTHICAL AI</div>
        <div style="background:#0A0A0A; padding:15px; border-radius:18px; border:1px solid #111;">
            <div style="display: flex; align-items: center; gap: 12px;">
                <div id="userInit" style="width:36px; height:36px; background:var(--p-purple); border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:bold;">?</div>
                <div>
                    <div id="userNameDisp" style="font-size:0.85rem; font-weight:bold;">User</div>
                    <span id="userTier" class="tier-badge">BASIC</span>
                </div>
            </div>
        </div>
        <button onclick="logout()" style="margin-top:auto; color:red; background:none; border:none; cursor:pointer;">Terminate Session</button>
    </div>
    <div id="main">
        <div id="chat"></div>
    </div>
</div>

<script>
// 🔐 YOUR CONFIG
const SB_URL = "https://mtczyuzbcunsflvcnatf.supabase.co";
const SB_KEY = "sb_secret_zNmUoxieIHwTqsNusdwNoA_GWLyAmys"; 
const supabase = window.supabase.createClient(SB_URL, SB_KEY);

// 👁️ PASS TOGGLE
function togglePass() {
    const p = document.getElementById("pass");
    const icon = document.getElementById("eyeIcon");
    p.type = p.type === "password" ? "text" : "password";
    icon.setAttribute("data-lucide", p.type === "password" ? "eye" : "eye-off");
    lucide.createIcons();
}

// 🔑 AUTH LOGIC
async function loginWith(provider){
    await supabase.auth.signInWithOAuth({ provider, options: { redirectTo: window.location.href } });
}

async function emailLogin(){
    const {data, error} = await supabase.auth.signInWithPassword({ 
        email: document.getElementById("email").value, 
        password: document.getElementById("pass").value 
    });
    if(error) alert(error.message);
    else setupUI(data.user);
}

async function signup(){
    const email = document.getElementById("email").value;
    const password = document.getElementById("pass").value;
    const name = document.getElementById("staffName").value;
    const {error} = await supabase.auth.signUp({ 
        email, 
        password, 
        options: { data: { full_name: name } } 
    });
    if(error) alert(error.message);
    else alert("Success! Log in now.");
}

// 👤 THE "STAFF RECOGNITION" ENGINE
function setupUI(user){
    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "flex";

    // Priority: Metadata Name > Manual Name Field > Email
    const name = user.user_metadata?.full_name || 
                 document.getElementById("staffName").value || 
                 user.email.split('@')[0];

    document.getElementById("userNameDisp").innerText = name;
    document.getElementById("userInit").innerText = name.charAt(0).toUpperCase();

    const badge = document.getElementById("userTier");
    const lower = name.toLowerCase();
    
    // 🔥 Staff Logic Trigger
    if(lower.includes("chethan")) { 
        badge.innerText="FOUNDER"; 
        badge.className="tier-badge badge-founder"; 
    }
    else if(lower.includes("thaman")) { 
        badge.innerText="ADMIN"; 
        badge.className="tier-badge badge-admin"; 
    }
    else if(lower.includes("pavan")) { 
        badge.innerText="MODERATOR"; 
        badge.className="tier-badge badge-mod"; 
    } else {
        badge.innerText="STAFF";
        badge.className="tier-badge";
    }

    if(window.location.hash) window.history.replaceState({}, document.title, window.location.pathname);
}

// 🚀 INITIALIZE
async function init(){
    const { data: { session } } = await supabase.auth.getSession();
    if(session) setupUI(session.user);
    supabase.auth.onAuthStateChange((event, session) => { if(session) setupUI(session.user); });
}

async function logout(){
    await supabase.auth.signOut();
    localStorage.clear();
    location.reload();
}

lucide.createIcons();
init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mythical AI | Trinity Portal</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --p-purple: #7D2AE8; --dark-bg: #050505; --card-bg: #0D0D0D; --border: #1a1a1a; }
        body { margin:0; font-family: 'Inter', sans-serif; background:#000; color:#fff; display:flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar & History */
        #sidebar { width:300px; background: var(--dark-bg); padding:20px; display:flex; flex-direction:column; border-right: 1px solid #111; gap: 12px; transition: 0.4s ease; position: relative; z-index: 1000; }
        #sidebar.closed { width: 0; padding: 0; overflow: hidden; border: none; }
        .logo-text { color: var(--p-purple); font-weight: 900; font-size: 1.2rem; letter-spacing: 3px; }
        .history-item { padding:10px; color:#666; cursor:pointer; font-size:0.85rem; border-radius: 8px; transition: 0.2s; display: flex; align-items: center; gap: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .history-item:hover { background: #111; color: #fff; }

        /* Tiers & Badges */
        .tier-badge { font-size: 0.6rem; padding: 3px 8px; border-radius: 6px; font-weight: bold; margin-left: 8px; text-transform: uppercase; }
        .badge-basic { background: #222; color: #888; border: 1px solid #333; }
        .badge-founder { background: linear-gradient(90deg, #FFD700, #FFA500); color: #000; animation: pulse-gold 2s infinite; border: 1px solid #FFF; }
        .badge-admin { background: #ff0044; color: #fff; border: 1px solid #FFF; }

        @keyframes pulse-gold { 0%, 100% { box-shadow: 0 0 5px rgba(255,215,0,0.4); } 50% { box-shadow: 0 0 20px rgba(255,215,0,0.8); } }

        /* Main Chat */
        #main { flex:1; display:flex; flex-direction:column; position: relative; }
        #chat { flex:1; overflow-y:auto; padding: 80px 15% 150px 15%; scroll-behavior: smooth; }
        .msg { max-width: 80%; margin: 20px 0; padding: 18px 24px; border-radius: 24px; line-height: 1.6; }
        .user { margin-left:auto; background: #111; border: 1px solid #222; }
        .bot { background: transparent; border-left: 2px solid var(--p-purple); padding-left: 25px; color: #ddd; }

        .input-container { position: absolute; bottom: 35px; left: 0; right: 0; display: flex; justify-content: center; z-index: 100; }
        .input-wrapper { width: 65%; background: rgba(15,15,15,0.8); backdrop-filter: blur(20px); border-radius: 50px; padding: 8px 12px 8px 25px; display: flex; align-items: center; border: 1px solid #222; }
        #input { flex:1; background:transparent; border:none; color:#fff; outline:none; font-size: 1rem; padding: 12px 0; }
        
        /* Auth UI */
        #login { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; background:#000; z-index: 3000; }
        .login-card { background:#0D0D0D; padding:40px; border-radius:30px; border:1px solid #222; text-align:center; width:340px; }
        .auth-btn { width:100%; padding:14px; border:none; border-radius:12px; cursor:pointer; font-weight:bold; display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:10px; transition: 0.3s; }
        .btn-google { background:#fff; color:#000; }
        .btn-github { background:#24292e; color:#fff; }
    </style>
</head>
<body>

<button id="sidebar-toggle" style="position:fixed; top:20px; left:20px; z-index:1001; background:#111; border:1px solid #333; color:#fff; padding:10px; border-radius:12px; cursor:pointer;" onclick="document.getElementById('sidebar').classList.toggle('closed')">
    <i data-lucide="menu"></i>
</button>

<div id="login">
    <div class="login-card">
        <h2 style="color:var(--p-purple); letter-spacing:3px; margin-bottom:25px;">MYTHICAL AI</h2>
        <button onclick="loginWith('google')" class="auth-btn btn-google">
            <img src="https://www.google.com/favicon.ico" width="18"> GOOGLE LOGIN
        </button>
        <button onclick="loginWith('github')" class="auth-btn btn-github">
            <i data-lucide="github" size="18"></i> GITHUB LOGIN
        </button>

        <div style="color:#333; font-size:0.7rem; margin:15px 0;">STAFF PIN ACCESS</div>
        <input id="userName" style="width:90%; padding:14px; margin:5px 0; background:#000; border:1px solid #333; color:#fff; border-radius:12px; outline:none;" placeholder="Name" oninput="checkStaff()">
        <div id="staff-pass-area" style="display:none;">
            <input id="staffPass" type="password" style="width:90%; padding:14px; background:#000; border:1px solid #FFD700; color:#fff; border-radius:12px;" placeholder="Security Pin">
        </div>
        <button onclick="manualLogin()" style="width:100%; padding:14px; background:var(--p-purple); color:#fff; border:none; border-radius:12px; cursor:pointer; font-weight:bold; margin-top:15px;">ENTER PORTAL</button>
    </div>
</div>

<div id="sidebar">
    <div style="cursor:pointer; padding: 10px 0;" onclick="location.reload()"><span class="logo-text">MYTHICAL AI</span></div>
    <div style="background:#0A0A0A; padding:15px; border-radius:18px; border:1px solid var(--border);">
        <div style="display: flex; align-items: center; gap: 12px;">
            <div id="userInit" style="width:36px; height:36px; background:var(--p-purple); border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:bold;">?</div>
            <div>
                <span id="sideName" style="font-size:0.9rem; font-weight:bold;">Guest</span>
                <span id="userTier" class="tier-badge badge-basic">BASIC</span>
            </div>
        </div>
    </div>
    <button onclick="newChat()" style="width:100%; padding:12px; background:transparent; border:1px solid #222; color:#fff; border-radius:12px; cursor:pointer; margin-top:10px;">+ New Thread</button>
    <div id="history" style="flex:1; overflow-y:auto; margin:10px 0;"></div>
    <button onclick="logout()" style="color:#ff4444; background:none; border:none; cursor:pointer; font-size:0.7rem; opacity:0.4;">Logout System</button>
</div>

<div id="main">
    <div id="chat"></div>
    <div class="input-container">
        <div class="input-wrapper">
            <input id="input" placeholder="Ask Mythical AI..." onkeydown="if(event.key==='Enter') send()">
            <button onclick="send()" style="background:var(--p-purple); color:white; border:none; width:45px; height:45px; border-radius:50%; cursor:pointer;"><i data-lucide="arrow-up" size="22"></i></button>
        </div>
    </div>
</div>

<script>
const GROQ_KEY = "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";
const SB_URL = "https://mtczyuzbcunsflvcnatf.supabase.co";
const SB_KEY = "sb_secret_zNmUoxieIHwTqsNusdwNoA_GWLyAmys"; 

const _supabase = window.supabase.createClient(SB_URL, SB_KEY);

// 1. DYNAMIC LOGIN
async function loginWith(provider) {
    const { error } = await _supabase.auth.signInWithOAuth({
        provider: provider,
        options: { redirectTo: "https://mythicalai.mythicalstudios.online/" }
    });
    if (error) alert(error.message);
}

// 2. TOKEN CATCHER & INITIALIZATION
async function init() {
    _supabase.auth.onAuthStateChange(async (event, session) => {
        if (session) {
            const u = session.user;
            const name = u.user_metadata.full_name || u.user_metadata.user_name || u.email;
            
            localStorage.setItem("myth_name", name);
            localStorage.setItem("myth_email", u.email);
            
            let tier = "basic";
            if (name.toLowerCase().includes("chethan")) tier = "founder";
            else if (name.toLowerCase().includes("thaman")) tier = "admin";
            else if (name.toLowerCase().includes("pavan")) tier = "mod";
            localStorage.setItem("myth_tier", tier);
            
            document.getElementById("login").style.display = "none";
            window.history.replaceState({}, document.title, "/");
            renderPortal();
        }
    });

    if (localStorage.getItem("myth_name")) renderPortal();
}

async function renderPortal() {
    const name = localStorage.getItem("myth_name");
    const tier = localStorage.getItem("myth_tier") || "basic";
    
    document.getElementById("login").style.display = "none";
    document.getElementById("sideName").innerText = name;
    document.getElementById("userInit").innerText = name.charAt(0).toUpperCase();
    
    const badge = document.getElementById("userTier");
    badge.innerText = tier;
    badge.className = `tier-badge badge-${tier}`;
    
    await fetchCloudHistory();
    newChat();
}

// 3. HISTORY SYNC
async function fetchCloudHistory() {
    const name = localStorage.getItem("myth_name");
    const { data, error } = await _supabase.from('mythical_chats')
        .select('*')
        .eq('owner', name)
        .order('created_at', { ascending: false });

    if (data) {
        document.getElementById("history").innerHTML = data.map(c => `
            <div class="history-item" onclick="loadCloudChat('${c.id}')">
                <i data-lucide="message-square" style="width:14px"></i>
                <span style="overflow:hidden">${c.title}</span>
            </div>
        `).join('');
        lucide.createIcons();
    }
}

// 4. CHAT CORE
let currentId = null;
let messages = [];

async function loadCloudChat(id) {
    const { data } = await _supabase.from('mythical_chats').select('*').eq('id', id).single();
    if (data) {
        currentId = data.id;
        messages = data.messages;
        document.getElementById("chat").innerHTML = "";
        messages.forEach(m => addMsg(m.content, m.role === "user"));
    }
}

function newChat() {
    currentId = null; messages = [];
    document.getElementById("chat").innerHTML = `<div style="text-align:center; margin-top:15vh;"><h1>Welcome, ${localStorage.getItem("myth_name")} ✨</h1><p style="color:#444;">Elite Network Cloud Synchronized.</p></div>`;
}

function addMsg(text, isUser) {
    const div = document.createElement("div");
    div.className = "msg " + (isUser ? "user" : "bot");
    div.innerText = (isUser ? "> " : "🤖 ") + text;
    document.getElementById("chat").appendChild(div);
    document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
}

async function send() {
    const input = document.getElementById("input");
    const text = input.value.trim();
    if(!text) return;

    addMsg(text, true);
    messages.push({role: "user", content: text});
    input.value = "";

    const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": "Bearer " + GROQ_KEY },
        body: JSON.stringify({ 
            messages: [{role: "system", content: "You are Mythical AI by U. Chethan."}, ...messages],
            model: "llama-3.3-70b-versatile"
        })
    });
    const data = await res.json();
    const reply = data.choices[0].message.content;
    addMsg(reply, false);
    messages.push({role: "assistant", content: reply});

    const name = localStorage.getItem("myth_name");
    if (!currentId) {
        const { data: n } = await _supabase.from('mythical_chats').insert([{ owner: name, title: text.substring(0, 25), messages: messages }]).select();
        if (n) currentId = n[0].id;
    } else {
        await _supabase.from('mythical_chats').update({ messages: messages }).eq('id', currentId);
    }
    fetchCloudHistory();
}

function checkStaff() {
    const n = document.getElementById("userName").value.toLowerCase();
    document.getElementById("staff-pass-area").style.display = (n.includes("chethan") || n.includes("thaman") || n.includes("pavan")) ? "block" : "none";
}

async function manualLogin() {
    const name = document.getElementById("userName").value;
    const pass = document.getElementById("staffPass").value;
    if (name.toLowerCase().includes("chethan") && pass !== "Chethan6912") return alert("Wrong Pin");
    localStorage.setItem("myth_name", name);
    localStorage.setItem("myth_tier", name.toLowerCase().includes("chethan") ? "founder" : "basic");
    renderPortal();
}

async function logout() {
    await _supabase.auth.signOut();
    localStorage.clear();
    location.reload();
}

lucide.createIcons();
init();
</script>
</body>
</html>

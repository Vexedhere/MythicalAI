<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mythical AI | Trinity Portal</title>
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root { --p-purple: #7D2AE8; --dark-bg: #050505; --border: #1a1a1a; --glass: rgba(255, 255, 255, 0.03); }
        * { box-sizing: border-box; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
        body { margin:0; font-family: 'Inter', sans-serif; background:#000; color:#fff; display:flex; height: 100vh; overflow: hidden; }
        
        /* OVERLAYS */
        #welcome-overlay { position: fixed; inset: 0; background: #000; z-index: 15000; display: none; align-items: center; justify-content: center; text-align: center; flex-direction: column; }
        .welcome-title { font-size: 3.5rem; font-weight: 900; color: var(--p-purple); text-transform: uppercase; letter-spacing: 5px; margin-bottom: 10px; }
        .welcome-sub { font-size: 1rem; color: #666; font-weight: 600; letter-spacing: 3px; }

        #login-gate { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; background:#000; z-index: 9999; }
        .gate-card { background:#0D0D0D; padding:40px; border-radius:35px; border:1px solid #222; text-align:center; width:min(95%, 380px); box-shadow: 0 0 60px rgba(125, 42, 232, 0.15); }
        
        input.gate-input { width:100%; padding:15px; margin:8px 0; background:#000; border:1px solid #222; color:#fff; border-radius:15px; outline:none; }
        .gate-btn { width:100%; padding:15px; background:var(--p-purple); color:#fff; border:none; border-radius:15px; cursor:pointer; font-weight:900; margin-top:20px; text-transform: uppercase; }

        /* APP LAYOUT */
        #app { display:none; flex:1; height: 100vh; width: 100%; }
        #sidebar { width:290px; background: var(--dark-bg); padding:24px; border-right: 1px solid var(--border); display:flex; flex-direction:column; gap: 20px; }
        #main-content { flex:1; display:flex; flex-direction:column; position: relative; background: #000; }

        /* SIDEBAR CHAT HISTORY */
        #chat-history { flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:10px; margin-top: 15px; }
        .history-btn { background:#0D0D0D; border:1px solid #1a1a1a; color:#888; padding:14px; border-radius:15px; cursor:pointer; text-align:left; font-size: 0.85rem; display: flex; align-items: center; gap: 10px; }
        .history-btn:hover { background: #111; color: #fff; border-color: var(--p-purple); }
        .active-chat { border-color: var(--p-purple); color: #fff; background: rgba(125, 42, 232, 0.05); }

        .top-bar { height: 75px; display: flex; align-items: center; justify-content: flex-end; padding: 0 35px; border-bottom: 1px solid #111; }
        .logout-pill { background: rgba(255, 40, 40, 0.05); border: 1px solid #331111; color: #ff4444; padding: 10px 22px; border-radius: 40px; cursor: pointer; font-size: 0.85rem; font-weight: 700; display: flex; align-items: center; gap: 10px; }

        #chat { flex:1; overflow-y:auto; padding: 80px 18% 150px 18%; scroll-behavior: smooth; }
        .msg { max-width: 85%; margin: 28px 0; padding: 22px; border-radius: 25px; line-height: 1.8; font-size: 0.98rem; }
        .bot { border-left: 4px solid var(--p-purple); color: #e0e0e0; background: rgba(125, 42, 232, 0.02); }
        .user { margin-left:auto; background: #0D0D0D; border: 1px solid #1A1A1A; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        .input-area { position: absolute; bottom: 40px; left: 0; right: 0; padding: 0 18%; }
        .input-wrap { width: 100%; background: rgba(12, 12, 12, 0.9); backdrop-filter: blur(30px); border: 1px solid #222; border-radius: 45px; padding: 12px 15px 12px 30px; display: flex; align-items: center; }
        #chat-input { flex:1; background:transparent; border:none; color:#fff; outline:none; font-size: 1.05rem; }
        
        .nav-btn { background: transparent; border: none; color: #fff; cursor: pointer; display: flex; align-items: center; gap: 12px; font-weight: 800; font-size: 0.95rem; padding: 12px 8px; }

        @media (max-width: 768px) { #sidebar { display: none; } #chat { padding: 80px 6% 150px 6%; } .input-area { padding: 0 6%; } }
    </style>
</head>
<body>

<div id="welcome-overlay">
    <div class="welcome-title" id="welcome-text">ACCESSING</div>
    <div class="welcome-sub" id="welcome-subtext">MYTHICAL CLOUD CORE V3.0</div>
</div>

<div id="login-gate">
    <div class="gate-card">
        <h2 style="color:var(--p-purple); font-weight:900; letter-spacing:4px;">MYTHICAL AI</h2>
        <div id="g_id_onload" data-client_id="YOUR_GOOGLE_ID" data-callback="handleGoogle"></div>
        <div class="g_id_signin" data-type="standard" data-theme="filled_black" style="margin-bottom: 25px; display:flex; justify-content:center;"></div>
        
        <input id="loginName" class="gate-input" placeholder="Full Name" oninput="detectStaff()">
        <input id="loginEmail" class="gate-input" type="email" placeholder="Email Address">
        <div id="staff-pin-box" style="display:none;"><input id="staffPass" class="gate-input" type="password" placeholder="Staff Security Key"></div>
        <div id="user-pass-box"><input id="userPass" class="gate-input" type="password" placeholder="User Password"></div>
        <button class="gate-btn" onclick="executeLogin()">Unlock Portal</button>
    </div>
</div>

<div id="app">
    <div id="sidebar">
        <div style="color:var(--p-purple); font-weight:900; font-size:1.1rem; letter-spacing:2px;">MYTHICAL AI</div>
        
        <button class="nav-btn" onclick="newChat()">
            <i data-lucide="plus-circle" size="20"></i> New Transmission
        </button>

        <div id="chat-history"></div>

        <div style="margin-top: auto; padding: 20px 0; border-top: 1px solid #111; display: flex; align-items: center; gap: 15px;">
            <div id="avatar" style="width: 42px; height: 42px; background: var(--p-purple); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 1.2rem;">?</div>
            <div>
                <div id="uName" style="font-size: 0.95rem; font-weight: 800;">User</div>
                <div id="uTier" style="font-size: 0.7rem; font-weight: 900; letter-spacing: 1.5px;">BASIC</div>
            </div>
        </div>
    </div>

    <div id="main-content">
        <div class="top-bar">
            <div class="logout-pill" onclick="logout()"><i data-lucide="power" size="16"></i> Terminate</div>
        </div>
        <div id="chat"></div>
        <div class="input-area">
            <div class="input-wrap">
                <input id="chat-input" placeholder="Message Mythical Cloud..." onkeydown="if(event.key==='Enter') sendMsg()">
                <button onclick="sendMsg()" style="background:#fff; border:none; width:48px; height:48px; border-radius:50%; cursor:pointer;"><i data-lucide="send" color="#000" size="22"></i></button>
            </div>
        </div>
    </div>
</div>

<script>
    const GROQ_KEY = "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";
    const staffDB = { "chethan": "C@MN", "thaman": "T@MN", "pavan": "P@MN" };
    
    let currentChatId = null;
    let chats = JSON.parse(localStorage.getItem("myth_chats") || "{}");

    function detectStaff() {
        const name = document.getElementById("loginName").value.toLowerCase().trim();
        const isStaff = !!staffDB[name];
        document.getElementById("staff-pin-box").style.display = isStaff ? "block" : "none";
        document.getElementById("user-pass-box").style.display = isStaff ? "none" : "block";
    }

    function executeLogin() {
        const name = document.getElementById("loginName").value.toLowerCase().trim();
        if (staffDB[name]) {
            if (document.getElementById("staffPass").value === staffDB[name]) loginSuccess(name);
            else alert("🔴 INVALID SECURITY KEY");
        } else {
            const email = document.getElementById("loginEmail").value;
            if (email.includes("@")) loginSuccess(name || "Guest");
            else alert("⚠️ VALID EMAIL REQUIRED");
        }
    }

    function handleGoogle(response) {
        const payload = JSON.parse(atob(response.credential.split('.')[1]));
        loginSuccess(payload.name);
    }

    function loginSuccess(name) {
        localStorage.setItem("myth_auth", "true");
        localStorage.setItem("myth_name", name);
        
        document.getElementById("login-gate").style.display = "none";
        const w = document.getElementById("welcome-overlay");
        const wTitle = document.getElementById("welcome-text");
        const wSub = document.getElementById("welcome-subtext");
        
        const lowName = name.toLowerCase().trim();
        w.style.display = "flex";
        
        if (lowName === 'chethan') {
            wTitle.innerText = "FOUNDER MODE";
            wSub.innerText = "CHEHTAN: FULL CLEARANCE GRANTED 👑";
        } else if (lowName === 'thaman') {
            wTitle.innerText = "ADMIN MODE";
            wSub.innerText = "THAMAN: SYSTEM PRIVILEGES ACTIVE 🛡️";
        } else if (lowName === 'pavan') {
            wTitle.innerText = "MODERATOR MODE";
            wSub.innerText = "PAVAN: ENFORCEMENT PROTOCOLS READY ⚔️";
        } else {
            wTitle.innerText = "WELCOME, " + name.toUpperCase();
            wSub.innerText = "ESTABLISHING SECURE BRIDGE ☁️";
        }

        setTimeout(() => {
            w.style.opacity = "0";
            setTimeout(() => { w.style.display = "none"; renderApp(); }, 500);
        }, 2500);
    }

    function renderApp() {
        document.getElementById("app").style.display = "flex";
        const name = (localStorage.getItem("myth_name") || "Guest").toLowerCase().trim();
        const dispName = document.getElementById("uName");
        const dispTier = document.getElementById("uTier");
        const avatar = document.getElementById("avatar");

        dispName.innerText = name.toUpperCase();
        avatar.innerText = name.charAt(0).toUpperCase();

        // --- 🛡️ THE STRICT IDENTITY ENGINE ---
        if (name === "chethan") {
            dispTier.innerText = "FOUNDER";
            dispTier.style.color = "#FFD700";
        } else if (name === "thaman") {
            dispTier.innerText = "ADMIN";
            dispTier.style.color = "#00E5FF";
        } else if (name === "pavan") {
            dispTier.innerText = "MODERATOR";
            dispTier.style.color = "#FF3D00";
        } else {
            dispTier.innerText = "BASIC TIER";
            dispTier.style.color = "#666";
        }

        renderHistory();
        const chatKeys = Object.keys(chats);
        if (chatKeys.length > 0) loadChat(chatKeys[chatKeys.length - 1]);
        else newChat();
        lucide.createIcons();
    }

    function logout() { localStorage.removeItem("myth_auth"); location.reload(); }

    function newChat() {
        currentChatId = "chat_" + Date.now();
        chats[currentChatId] = [];
        saveChats();
        renderHistory();
        document.getElementById("chat").innerHTML = `<div class="msg bot">🤖 Hello ${localStorage.getItem("myth_name")}, how can I assist you?</div>`;
    }

    function saveChats() { localStorage.setItem("myth_chats", JSON.stringify(chats)); }

    function renderHistory() {
        const container = document.getElementById("chat-history");
        container.innerHTML = "";
        Object.keys(chats).reverse().forEach(id => {
            const btn = document.createElement("button");
            btn.className = "history-btn" + (id === currentChatId ? " active-chat" : "");
            btn.innerHTML = `<span>💬</span> ${chats[id][0]?.user?.slice(0, 20) || "New Chat"}`;
            btn.onclick = () => loadChat(id);
            container.appendChild(btn);
        });
    }

    function loadChat(id) {
        currentChatId = id;
        const c = document.getElementById("chat");
        c.innerHTML = "";
        chats[id].forEach(m => {
            c.innerHTML += `<div class="msg user">${m.user} 👤</div>`;
            c.innerHTML += `<div class="msg bot">🤖 ${m.bot}</div>`;
        });
        c.scrollTop = c.scrollHeight;
        renderHistory();
    }

    async function sendMsg() {
        const inp = document.getElementById("chat-input");
        const val = inp.value.trim(); if(!val) return;
        const c = document.getElementById("chat");
        const user = localStorage.getItem("myth_name") || "Guest";

        if (!currentChatId) newChat();
        c.innerHTML += `<div class="msg user">${val} 👤</div>`;
        inp.value = "";
        c.scrollTop = c.scrollHeight;

        try {
            const r = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${GROQ_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify({ 
                    model: "llama-3.3-70b-versatile", 
                    messages: [
                        {role: "system", content: `You are Mythical AI by U. Chethan. User: ${user}.`},
                        {role: "user", content: val}
                    ] 
                })
            });
            const d = await r.json();
            const reply = d.choices[0].message.content;
            c.innerHTML += `<div class="msg bot">🤖 ${reply}</div>`;
            chats[currentChatId].push({ user: val, bot: reply });
            saveChats();
            renderHistory();
        } catch(e) { c.innerHTML += `<div class="msg bot">⚠️ Connection error.</div>`; }
        c.scrollTop = c.scrollHeight;
    }

    window.onload = () => { if(localStorage.getItem("myth_auth")) renderApp(); lucide.createIcons(); };
</script>
</body>
</html>
